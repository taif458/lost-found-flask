<!DOCTYPE html>
<html lang="{{ current_lang }}" dir="{{ html_dir }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ t['default_title'] }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header">
        <nav class="container app-nav" aria-label="Main navigation">
            <a class="brand" href="{{ url_for('index', lang=current_lang) }}">
                <span class="brand-mark">LF</span>
                <span>
                    <strong>{{ t['brand'] }}</strong>
                    <small>{{ t['brand_subtitle'] }}</small>
                </span>
            </a>
            <div class="nav-actions">
                <a href="{{ url_for('add_lost') }}">{{ t['nav_report'] }}</a>
                <a href="{{ url_for('search') }}">{{ t['nav_search'] }}</a>
                <a href="{{ url_for('login') }}">{{ t['nav_admin'] }}</a>
                <a class="language-toggle" href="{{ url_for('index', lang=other_lang) }}">{{ t['language_label'] }}</a>
            </div>
        </nav>
    </header>

    <main class="container page-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <span>&copy; {{ datetime.utcnow().year }} {{ t['footer_brand'] }}</span>
        <span>{{ t['footer_note'] }}</span>
    </footer>
</body>
</html>
