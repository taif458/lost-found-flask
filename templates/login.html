{% extends "base.html" %}
{% block title %}{{ t['login_title'] }}{% endblock %}
{% block content %}
<div class="auth-shell">
<section class="content-card login-card">
    <span class="eyebrow">{{ t['login_eyebrow'] }}</span>
    <h2>{{ t['login_heading'] }}</h2>
    <p class="muted-text">{{ t['login_text'] }}</p>

    {% if error %}
        <div class="alert alert-neutral polished-alert">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">{{ t['password_label'] }}</label>
            <input type="password" class="form-control" name="password" required>
        </div>
        <button type="submit" class="btn btn-custom w-100">{{ t['login_button'] }}</button>
        <a href="{{ url_for('index', lang=current_lang) }}" class="btn btn-outline-custom w-100 mt-2">{{ t['back'] }}</a>
    </form>
</section>
</div>
{% endblock %}
